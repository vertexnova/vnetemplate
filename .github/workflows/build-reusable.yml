# Reusable workflow: configure, build, test, and optionally collect
# coverage for one platform. Called by ci.yml and release-please.yml.
# ----------------------------------------------------------------------

name: "Build and Test (Reusable)"

on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub-hosted runner label (e.g. ubuntu-latest)"
        required: true
        type: string
      c_compiler:
        description: "C compiler to use (empty = runner default)"
        required: false
        type: string
        default: ""
      cpp_compiler:
        description: "C++ compiler to use (empty = runner default)"
        required: false
        type: string
        default: ""
      platform:
        description: "Platform identifier used as cache key discriminator"
        required: true
        type: string
      build_type:
        description: "CMake build type: Release or Debug"
        required: false
        type: string
        default: "Release"
      enable_coverage:
        description: "Enable lcov coverage collection and Codecov upload"
        required: false
        type: boolean
        default: false
      warnings_as_errors:
        description: "Enable -DWARNINGS_AS_ERRORS=ON"
        required: false
        type: boolean
        default: true
    secrets:
      codecov_token:
        description: "Codecov upload token (required when enable_coverage is true)"
        required: false

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    name: "Build + Test (${{ inputs.platform }}, ${{ inputs.build_type }})"
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true   # direct submodules only (vnecmake, googletest, vnecommon, vnelogging)

      - name: Use HTTPS for GitHub (CI runners have no SSH key)
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Init nested submodules
        shell: bash
        run: |
          for dep in deps/internal/vnelogging deps/internal/vnecommon; do
            if [ -d "$dep/.git" ]; then
              git -C "$dep" submodule update --init --recursive
            fi
          done

      # ------------------------------------------------------------------
      # CMake build cache — keyed on CMakeLists + .gitmodules content.
      # hashFiles args must be separate quoted strings (not comma-joined).
      # ------------------------------------------------------------------
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ inputs.platform }}-${{ inputs.build_type }}-${{ hashFiles('CMakeLists.txt') }}-${{ hashFiles('**/CMakeLists.txt') }}-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            build-${{ inputs.platform }}-${{ inputs.build_type }}-
            build-${{ inputs.platform }}-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential cmake

      - name: Install lcov (coverage builds only)
        if: runner.os == 'Linux' && inputs.enable_coverage
        run: sudo apt-get install -y lcov

      # ------------------------------------------------------------------
      # Configure
      # Coverage requires Debug + ENABLE_COVERAGE=ON to emit .gcda files.
      # Compute effective build type first so build/test/ctest all agree.
      # ------------------------------------------------------------------
      - name: Configure CMake
        shell: bash
        run: |
          # Coverage forces Debug regardless of inputs.build_type
          if [[ "${{ inputs.enable_coverage }}" == "true" ]]; then
            BUILD_TYPE="Debug"
            COVERAGE_FLAG="-DENABLE_COVERAGE=ON"
          else
            BUILD_TYPE="${{ inputs.build_type }}"
            COVERAGE_FLAG=""
          fi

          COMPILER_FLAGS=""
          if [[ -n "${{ inputs.c_compiler }}" ]]; then
            COMPILER_FLAGS="-DCMAKE_C_COMPILER=${{ inputs.c_compiler }} -DCMAKE_CXX_COMPILER=${{ inputs.cpp_compiler }}"
          fi

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DVNE_TEMPLATE_CI=ON \
            -DWARNINGS_AS_ERRORS=${{ inputs.warnings_as_errors && 'ON' || 'OFF' }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${COVERAGE_FLAG} \
            ${COMPILER_FLAGS}

          # Save effective build type for downstream steps
          echo "EFFECTIVE_BUILD_TYPE=${BUILD_TYPE}" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: cmake --build build --config "$EFFECTIVE_BUILD_TYPE" --parallel

      # ------------------------------------------------------------------
      # Test — JUnit XML output for inline PR annotations
      # Note: --output-junit requires CMake 3.21+; ubuntu-latest ships 3.22+
      # ------------------------------------------------------------------
      - name: Test
        shell: bash
        working-directory: build
        run: |
          ctest \
            --output-on-failure \
            --output-junit test-results.xml \
            -C "$EFFECTIVE_BUILD_TYPE"

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "build/test-results.xml"
          check_name: "Tests (${{ inputs.platform }}, ${{ inputs.build_type }})"
          fail_on_failure: true

      - name: Write test summary
        if: always()
        shell: bash
        run: |
          echo "## Test Results: ${{ inputs.platform }} (${{ inputs.build_type }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -f build/test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' build/test-results.xml | head -1 | grep -o '[0-9]*' || echo "?")
            FAIL=$(grep -o 'failures="[0-9]*"' build/test-results.xml | head -1 | grep -o '[0-9]*' || echo "?")
            if [[ "$TOTAL" != "?" && "$FAIL" != "?" ]]; then
              echo "Passed: $((TOTAL - FAIL)) / $TOTAL" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Could not parse test-results.xml" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No test-results.xml found" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ------------------------------------------------------------------
      # Coverage (Linux/GCC only, controlled by enable_coverage input)
      # ------------------------------------------------------------------
      - name: Generate lcov coverage report
        if: inputs.enable_coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch,unused
          lcov --remove coverage.info \
            '/usr/*' '*/tests/*' '*/deps/external/*' '*/deps/internal/*' \
            '*/_deps/*' '*/googletest/*' '*/googlemock/*' \
            --output-file coverage.info --ignore-errors mismatch,unused
          lcov --list coverage.info --ignore-errors mismatch,unused

      - name: Upload coverage to Codecov
        if: inputs.enable_coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.codecov_token }}
          files: ./coverage.info
          fail_ci_if_error: false
          verbose: true
          flags: ${{ inputs.platform }}
